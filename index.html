<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 3002 Memorial/Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        h1 {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .photo {
            margin: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            width: 200px;
        }
        .photo img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Class 3002 Memorial/Photo Gallery</h1>
    <div class="gallery">
        <!-- Photos can be added here -->
        <div class="photo">
            <img src="photo1.jpg" alt="Photo 1">
        </div>
        <div class="photo">
            <img src="photo2.jpg" alt="Photo 2">
        </div>
        <div class="photo">
            <img src="photo3.jpg" alt="Photo 3">
        </div>
        <!-- Add more photos as needed -->
    </div>
</body>
</html>
